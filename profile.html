<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Decider - Profile</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(90deg, #f06a00 0%, #d85a00 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .browser-frame {
      width: 1100px;
      max-width: 100%;
      background: #9a4d24;
      border-radius: 16px;
      padding: 18px 18px 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      min-height: 30px;
    }

    .dots {
      display: flex;
      gap: 10px;
      margin-left: 6px;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.95;
    }

    .main-card {
      background: #fff;
      border-radius: 32px;
      padding: 28px 34px 30px;
      min-height: 620px;
      position: relative;
      overflow: hidden;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #8c5a46;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #efefef;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 18px;
      color: #666;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #e3e3e3;
    }

    .content {
      display: flex;
      gap: 26px;
      align-items: flex-start;
    }

    .left-panel {
      width: 34%;
      background: #faf7f5;
      border-radius: 28px;
      padding: 28px 22px;
      text-align: center;
      border: 2px solid #f1e2d8;
    }

    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: #d8ecff;
      border: 5px solid #ffffff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-placeholder {
      font-size: 70px;
    }

    .upload-label {
      display: inline-block;
      background: #f4a07b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-label:hover {
      background: #ee8f66;
    }

    .remove-btn {
      background: #efefef;
      border: none;
      color: #666;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .remove-btn:hover {
      background: #e2e2e2;
    }

    #profileImageInput {
      display: none;
    }

    .preview-name {
      font-size: 32px;
      font-weight: 800;
      color: #4f668f;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .preview-email {
      font-size: 18px;
      color: #666;
      word-break: break-word;
      margin-bottom: 14px;
    }

    .profile-note {
      font-size: 16px;
      color: #8c5a46;
      line-height: 1.6;
    }

    .right-panel {
      width: 66%;
    }

    .page-title {
      font-size: 54px;
      font-weight: 900;
      color: #4f668f;
      margin-bottom: 22px;
      line-height: 1;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 20px;
      font-weight: 700;
      color: #444;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 2px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 18px;
      outline: none;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #f28a53;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .helper-text {
      font-size: 14px;
      color: #888;
      margin-top: 2px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .save-btn {
      background: #f4a07b;
      color: #fff;
    }

    .save-btn:hover {
      background: #ee8f66;
    }

    .reset-btn {
      background: #efefef;
      color: #666;
    }

    .reset-btn:hover {
      background: #e3e3e3;
    }

    .back-btn {
      background: #b9d98b;
      color: #fff;
    }

    .back-btn:hover {
      background: #a8cb75;
    }

    @media (max-width: 900px) {
      .content {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .page-title {
        font-size: 40px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="browser-frame">
    <div class="topbar">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="main-card">
      <div class="header-row">
        <div class="logo">MEAL DECIDER</div>

        <div class="nav-actions">
          <button class="nav-btn" onclick="goHome()">หน้าหลัก</button>
          <button class="nav-btn" onclick="goHistory()">ประวัติเมนู</button>
          <button class="nav-btn" onclick="logout()">ออกจากระบบ</button>
        </div>
      </div>

      <div class="content">
        <div class="left-panel">
          <div class="avatar-wrap">
            <div class="avatar">
              <img id="previewImage" alt="Profile Image">
              <div class="avatar-placeholder" id="avatarPlaceholder">👤</div>
            </div>

            <label for="profileImageInput" class="upload-label">อัปโหลดรูปโปรไฟล์</label>
            <input type="file" id="profileImageInput" accept="image/*">

            <button class="remove-btn" type="button" onclick="removeProfileImage()">ลบรูป</button>
          </div>

          <div class="preview-name" id="previewName">ชื่อผู้ใช้</div>
          <div class="preview-email" id="previewEmail">example@email.com</div>
          <div class="profile-note" id="previewBio">
            ข้อมูลโปรไฟล์ของคุณจะช่วยให้ระบบแนะนำเมนูได้เหมาะสมมากขึ้น
          </div>
        </div>

        <div class="right-panel">
          <div class="page-title">ข้อมูลส่วนตัว</div>

          <div class="form-grid">
            <div class="form-group">
              <label for="name">ชื่อผู้ใช้</label>
              <input id="name" type="text" placeholder="กรอกชื่อของคุณ">
            </div>

            <div class="form-group">
              <label for="email">อีเมล</label>
              <input id="email" type="email" placeholder="กรอกอีเมล">
            </div>

            <div class="form-group full">
              <label for="favoriteType">ประเภทอาหารที่ชอบ</label>
              <input id="favoriteType" type="text" placeholder="เช่น อาหารไทย, ของหวาน, ญี่ปุ่น">
              <div class="helper-text">คั่นหลายค่าได้ด้วยเครื่องหมาย ,</div>
            </div>

            <div class="form-group full">
              <label for="avoidFood">อาหารที่ไม่ทาน / แพ้อาหาร</label>
              <input id="avoidFood" type="text" placeholder="เช่น กุ้ง, ถั่ว, นม">
              <div class="helper-text">คั่นหลายค่าได้ด้วยเครื่องหมาย ,</div>
            </div>

            <div class="form-group">
              <label for="spicyLevel">ระดับความเผ็ด</label>
              <select id="spicyLevel">
                <option value="">-- เลือกระดับความเผ็ด --</option>
                <option value="ไม่ใส่พริก">ไม่ใส่พริก</option>
                <option value="เผ็ดน้อยมาก">เผ็ดน้อยมาก</option>
                <option value="เผ็ดน้อย">เผ็ดน้อย</option>
                <option value="เผ็ดปานกลาง">เผ็ดปานกลาง</option>
                <option value="เผ็ดปกติ">เผ็ดปกติ</option>
                <option value="เผ็ดมาก">เผ็ดมาก</option>
              </select>
            </div>

            <div class="form-group">
              <label for="budget">งบประมาณต่อมื้อ</label>
              <select id="budget">
                <option value="">-- เลือกงบประมาณ --</option>
                <option value="ต่ำกว่า 50 บาท">ต่ำกว่า 50 บาท</option>
                <option value="50-100 บาท">50-100 บาท</option>
                <option value="100-150 บาท">100-150 บาท</option>
                <option value="150-300 บาท">150-300 บาท</option>
                <option value="300-400 บาท">300-400 บาท</option>
              </select>
            </div>

            <div class="form-group full">
              <label for="bio">หมายเหตุเพิ่มเติม</label>
              <textarea id="bio" placeholder="เช่น ชอบอาหารง่าย ๆ ไม่อยากรอนาน หรือชอบร้านใกล้ตัว"></textarea>
            </div>
          </div>

          <div class="action-row">
            <button class="action-btn save-btn" type="button" onclick="saveProfile()">บันทึกข้อมูล</button>
                        <button class="action-btn reset-btn" type="button" onclick="resetProfile()">ล้างข้อมูล</button>
            <button class="action-btn back-btn" type="button" onclick="goHome()">กลับหน้าหลัก</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = "result.html";
    }

    function goHistory() {
      window.location.href = "history.html";
    }

    function logout() {
      const confirmLogout = confirm("ต้องการออกจากระบบหรือไม่");
      if (confirmLogout) {
        localStorage.removeItem("isLogin");
        localStorage.removeItem("loggedInEmail");
        localStorage.removeItem("loggedInName");
        window.location.href = "login.html";
      }
    }

    function saveProfile() {
      const profileData = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        favoriteType: document.getElementById("favoriteType").value.trim(),
        avoidFood: document.getElementById("avoidFood").value.trim(),
        spicyLevel: document.getElementById("spicyLevel").value,
        budget: document.getElementById("budget").value,
        bio: document.getElementById("bio").value.trim(),
        image: localStorage.getItem("profileImageData") || ""
      };

      localStorage.setItem("userProfile", JSON.stringify(profileData));

      if (profileData.name) {
        localStorage.setItem("loggedInName", profileData.name);
      }

      if (profileData.email) {
        localStorage.setItem("loggedInEmail", profileData.email);
      }

      updatePreview(profileData);
      alert("บันทึกโปรไฟล์เรียบร้อยแล้ว");
    }

    function loadProfile() {
      const savedProfile = JSON.parse(localStorage.getItem("userProfile"));
      if (!savedProfile) return;

      document.getElementById("name").value = savedProfile.name || "";
      document.getElementById("email").value = savedProfile.email || "";
      document.getElementById("favoriteType").value = savedProfile.favoriteType || "";
      document.getElementById("avoidFood").value = savedProfile.avoidFood || "";
      document.getElementById("spicyLevel").value = savedProfile.spicyLevel || "";
      document.getElementById("budget").value = savedProfile.budget || "";
      document.getElementById("bio").value = savedProfile.bio || "";

      if (savedProfile.image) {
        localStorage.setItem("profileImageData", savedProfile.image);
      }

      updatePreview(savedProfile);
    }

    function updatePreview(profile) {
      document.getElementById("previewName").textContent =
        profile.name || "ชื่อผู้ใช้";

      document.getElementById("previewEmail").textContent =
        profile.email || "example@email.com";

      document.getElementById("previewBio").textContent =
        profile.bio || "ข้อมูลโปรไฟล์ของคุณจะช่วยให้ระบบแนะนำเมนูได้เหมาะสมมากขึ้น";

      const previewImage = document.getElementById("previewImage");
      const avatarPlaceholder = document.getElementById("avatarPlaceholder");
      const imageData = profile.image || localStorage.getItem("profileImageData");

      if (imageData) {
        previewImage.src = imageData;
        previewImage.style.display = "block";
        avatarPlaceholder.style.display = "none";
      } else {
        previewImage.src = "";
        previewImage.style.display = "none";
        avatarPlaceholder.style.display = "block";
      }
    }

    document.getElementById("profileImageInput").addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const imageData = e.target.result;
        localStorage.setItem("profileImageData", imageData);

        const currentProfile = JSON.parse(localStorage.getItem("userProfile")) || {};
        currentProfile.image = imageData;
        localStorage.setItem("userProfile", JSON.stringify(currentProfile));

        updatePreview(currentProfile);
      };

      reader.readAsDataURL(file);
    });

    function removeProfileImage() {
      localStorage.removeItem("profileImageData");

      const currentProfile = JSON.parse(localStorage.getItem("userProfile")) || {};
      currentProfile.image = "";
      localStorage.setItem("userProfile", JSON.stringify(currentProfile));

      updatePreview(currentProfile);
    }

    function preloadLoggedInName() {
      const loggedInName = localStorage.getItem("loggedInName");
      const loggedInEmail = localStorage.getItem("loggedInEmail");

      if (!document.getElementById("name").value && loggedInName) {
        document.getElementById("name").value = loggedInName;
      }

      if (!document.getElementById("email").value && loggedInEmail) {
        document.getElementById("email").value = loggedInEmail;
      }
    }

   loadProfile();
preloadLoggedInName();

updatePreview({
  name: document.getElementById("name").value.trim(),
  email: document.getElementById("email").value.trim(),
  bio: document.getElementById("bio").value.trim(),
  image: localStorage.getItem("profileImageData") || ""
});
  </script>
</body>
</html>
