    }

    body{
      min-height:100vh;

      align-items:center;
      padding:24px;
    }

    .browser-frame{
      width:1180px;

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .dots{
      display:flex;
      gap:10px;
      margin-left:6px;
    }

    .dot{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
    }

    .searchbar{

      height:54px;
      border-radius:14px;

      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      color:#333;
      font-size:28px;
    }

    .main-card{
      background:#fff;
      border-radius:32px;
      overflow:hidden;
      min-height:700px;
      position:relative;
    }

    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 26px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      gap:12px;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      letter-spacing:1px;
      color:#8c5a46;
    }

    .nav-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-btn{
      background:#efefef;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:18px;
      color:#666;
      cursor:pointer;
    }

    .nav-btn.active{
      background:#e5e5e5;
      font-weight:700;
    }

    .content{
      padding:26px 30px 34px;
    }

    .search-box{
      width:100%;
      max-width:620px;
      height:62px;
      border:3px solid #6b625e;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      margin-bottom:30px;
    }

    .search-box input{
      border:none;
      outline:none;
      width:100%;
      font-size:24px;
      margin:0 12px;
    }

    .search-box .icon{
      font-size:28px;
      color:#333;
    }

    .grid{
      display:grid;
    grid-template-columns:1fr 1fr;
      gap:34px 42px;
    }

    .section h2{
      font-size:28px;
      font-weight:500;
      color:#333;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }

    .section hr{
      border:none;
      border-top:2px solid #d9d9d9;
      margin-bottom:18px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .chip{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      background:#ededed;
      font-size:18px;
      color:#444;
      cursor:pointer;
      transition:0.2s;
    }

    .chip.selected{
      background:#9ee56f;
      color:#1f3d10;
      font-weight:600;
    }

    .chip.more{
      background:#dcdcdc;
    }

    .bottom-row{
      margin-top:34px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      border-radius:999px;
      padding:16px 28px;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
    }

    .back-btn{

      color:#666;
    }

    .save-btn{
      background:#d67b49;
      color:white;
    }

    .socials{
      position:absolute;
      right:22px;
      bottom:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .social-icon{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-decoration:none;
      font-size:18px;
      font-weight:800;
    }

    .phone-btn{ background:#25d366; }
    .mail-btn{ background:#2563eb; }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }

      .searchbar{
        display:none;
      }
    }
  </style>
</head>

  <script>
    let selectedIngredients = [];

    const chips = document.querySelectorAll(".chip[data-value]");
    chips.forEach(chip => {
      chip.addEventListener("click", function () {
        const value = chip.dataset.value;
        chip.classList.toggle("selected");

        if (selectedIngredients.includes(value)) {
          selectedIngredients = selectedIngredients.filter(item => item !== value);
        } else {
          selectedIngredients.push(value);
        }
      });
    });

    function saveAndGoResult() {
      localStorage.setItem("fridgeItems", JSON.stringify(selectedIngredients));
      window.location.href = "fridge-result.html";
    }

    function goBack() {
      window.location.href = "result.html";
    }

    function goHome() {
      window.location.href = "result.html";
    }

    function goHistory() {
      window.location.href = "history.html";
    }

    function logout() {
  const confirmLogout = confirm("ต้องการออกจากระบบหรือไม่");
  if (confirmLogout) {
    localStorage.removeItem("isLogin");
    localStorage.removeItem("loggedInEmail");
    localStorage.removeItem("loggedInName");
    window.location.href = "login.html";
  }
}
    function clearSearch() {
      document.getElementById("ingredientSearch").value = "";
    }

    window.onload = function () {
      const saved = localStorage.getItem("fridgeItems");
      if (saved) {
        selectedIngredients = JSON.parse(saved);
        chips.forEach(chip => {
          if (selectedIngredients.includes(chip.dataset.value)) {
            chip.classList.add("selected");
          }
        });
      }
    };
     function goProfile() {
    window.location.href = "profile.html";
  }
    window.onload = function () {
  localStorage.removeItem("fridgeItems");
};
