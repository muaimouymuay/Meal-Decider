  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;

    }

    body{
      min-height:100vh;
      background:linear-gradient(90deg,#f06a00 0%,#d85a00 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .browser-frame{
      width:1180px;
      max-width:100%;
      background:#8f4720;
      border-radius:18px;
      padding:18px 18px 24px;
      box-shadow:0 18px 40px rgba(0,0,0,0.25);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .dots{
      display:flex;
      gap:10px;
      margin-left:6px;
    }

    .dot{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
    }

    .searchbar{
      width:520px;
      max-width:55%;
      height:54px;
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      color:#333;
      font-size:28px;
    }

    .main-card{
      background:#fff;
      border-radius:32px;
      overflow:hidden;
      min-height:700px;
      position:relative;
    }

    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 26px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      gap:12px;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      letter-spacing:1px;
      color:#8c5a46;
    }

    .nav-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-btn{
      background:#efefef;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:18px;
      color:#666;
      cursor:pointer;
    }

    .nav-btn.active{
      background:#e5e5e5;
      font-weight:700;
    }

    .content{
      display:grid;
      grid-template-columns:340px 1fr;
      gap:26px;
      padding:26px 30px 34px;
    }

    .left-panel{
      background:#f5fbff;
      border-radius:28px;
      padding:24px 20px;
      min-height:520px;
    }

    .left-panel h2{
      font-size:32px;
      color:#333;
      margin-bottom:10px;
      text-align:center;
    }

    .left-panel p{
      color:#666;
      font-size:18px;
      text-align:center;
      margin-bottom:18px;
    }

    .ingredient-list{
      margin-top:18px;
    }

    .ingredient-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 0;
      border-bottom:1px solid #e5e5e5;
      font-size:18px;
      color:#444;
    }

    .right-panel h1{
      font-size:34px;
      color:#333;
      margin-bottom:12px;
    }

    .right-panel h3{
      font-size:22px;
      color:#444;
      margin-bottom:14px;
    }

    .ingredient-tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:24px;
    }

    .tag{
      background:#ededed;
      border-radius:12px;
      padding:10px 16px;
      font-size:18px;
      color:#555;
    }

    .recipe-list{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .recipe-card{
      display:grid;
      grid-template-columns:160px 1fr 120px;
      gap:18px;
      align-items:center;
      border:2px solid #e6e6e6;
      border-radius:26px;
      padding:16px;
      background:#fff;
    }

    .recipe-img{
      width:160px;
      height:120px;
      border-radius:18px;
      background:#f7efe8;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:54px;
    }

    .recipe-info h4{
      font-size:28px;
      color:#333;
      margin-bottom:8px;
    }

    .recipe-info p{
      font-size:17px;
      color:#666;
      line-height:1.6;
      margin-bottom:8px;
    }

    .match-badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      font-size:15px;
      font-weight:700;
      margin-bottom:10px;

    .badge-good{
      background:#dff5d3;
      color:#2f6b1f;
    }

    .badge-mid{
      background:#fff1cc;
      color:#8a6a00;
    }

    .badge-low{
      background:#f3f3f3;
      color:#666;
    }

    .small-note{
      font-size:15px;
      color:#777;
    }

    .recipe-actions{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:18px;
      color:#666;
      text-align:center;
    }

    .recipe-actions .percent{
      font-size:24px;
      font-weight:800;
      color:#d67b49;
    }

    .bottom-actions{
      margin-top:24px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      border-radius:999px;
      padding:14px 22px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
    }

    .back-btn{
      background:#efefef;
      color:#666;
    }

    .orange-btn{
      background:#d67b49;
      color:white;
    }

    .socials{
      position:absolute;
      right:22px;
      bottom:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .social-icon{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-decoration:none;
      font-size:18px;
      font-weight:800;
    }

    .phone-btn{ background:#25d366; }
    .mail-btn{ background:#2563eb; }

    @media (max-width: 980px){
      .content{
        grid-template-columns:1fr;
      }

      .recipe-card{
        grid-template-columns:1fr;
      }

      .recipe-img{
        width:100%;
      }
    }
  </style>
</head>

    function getFridgeItems() {
  const raw = localStorage.getItem("fridgeItems");
  return raw ? JSON.parse(raw) : [];
}

    function scoreRecipes(items) {
      return recipes.map(recipe => {
        const matched = recipe.ingredients.filter(ingredient => items.includes(ingredient));
        const missing = recipe.ingredients.filter(ingredient => !items.includes(ingredient));
        const score = recipe.ingredients.length > 0
          ? Math.round((matched.length / recipe.ingredients.length) * 100)
          : 0;

        return {
          ...recipe,
          matched,
          missing,
          score
        };
      }).sort((a, b) => b.score - a.score || a.missing.length - b.missing.length);
    }

    function renderIngredients(items) {
      document.getElementById("ingredientCount").textContent =
        "You have " + items.length + " ingredients";

      const tagBox = document.getElementById("ingredientTags");
      tagBox.innerHTML = "";

      if (items.length === 0) {
        tagBox.innerHTML = "<span class='tag'>ยังไม่ได้เลือกวัตถุดิบ</span>";
      } else {
        items.forEach(item => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = item;
          tagBox.appendChild(span);
        });
      }

      const listBox = document.getElementById("ingredientList");
      listBox.innerHTML = "";

      if (items.length === 0) {
        listBox.innerHTML = "<p style='color:#777;'>ยังไม่ได้เลือกวัตถุดิบ</p>";
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "ingredient-item";
        div.innerHTML = "<span>" + item + "</span><span>🗑️</span>";
        listBox.appendChild(div);
      });
    }

    function getBadgeClass(score) {
      if (score === 100) return "match-badge badge-good";
      if (score >= 50) return "match-badge badge-mid";
      return "match-badge badge-low";
    }

    function getBadgeText(score, missingCount) {
      if (score === 100) return "ทำได้เลย";
      if (score >= 50) return "ใกล้ครบแล้ว";
      if (missingCount === 0) return "ทำได้เลย";
      return "แนะนำเผื่อไว้";
    }

    function renderRecipes(items) {
      const scored = scoreRecipes(items);
      const recipeList = document.getElementById("recipeList");
      recipeList.innerHTML = "";

      const displayRecipes = scored.slice(0, 12);

      document.getElementById("recipeCountTitle").textContent =
        "Recommended " + displayRecipes.length + " recipes";

      displayRecipes.forEach(recipe => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        let missingText = "";
        if (recipe.missing.length === 0) {
          missingText = "คุณมีวัตถุดิบครบทั้งหมด";
        } else {
          missingText = "ยังขาด: " + recipe.missing.join(", ");
        }

        card.innerHTML = `
          <div class="recipe-img">${recipe.emoji}</div>
          <div class="recipe-info">
            <div class="${getBadgeClass(recipe.score)}">${getBadgeText(recipe.score, recipe.missing.length)}</div>
            <h4>${recipe.name}</h4>
            <p>${recipe.detail}</p>
            <p class="small-note">มีแล้ว: ${recipe.matched.length ? recipe.matched.join(", ") : "ยังไม่มีวัตถุดิบตรง"}</p>
            <p class="small-note">${missingText}</p>
          </div>
          <div class="recipe-actions">
            <div class="percent">${recipe.score}%</div>
            <div>match</div>
          </div>
        `;
        recipeList.appendChild(card);
      });
    }

    function goBack() {
      window.location.href = "fridge.html";
    }

      window.location.href = "result.html";

    function goHome() {

    function logout() {
  const confirmLogout = confirm("ต้องการออกจากระบบหรือไม่");
  if (confirmLogout) {
    localStorage.removeItem("isLogin");
    localStorage.removeItem("loggedInEmail");
    localStorage.removeItem("loggedInName");
    window.location.href = "login.html";
  }
}

    const items = getFridgeItems();
    renderIngredients(items);
    renderRecipes(items);
