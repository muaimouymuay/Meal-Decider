      background:#fff;
    }

    .searchbar{

      height:54px;
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      color:#333;
      font-size:28px;
    }

    .main-card{
      background:#fff;
      border-radius:32px;
      overflow:hidden;
      min-height:700px;
      position:relative;
    }

    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 26px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      gap:12px;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      letter-spacing:1px;
      color:#8c5a46;
    }

      gap:12px;

    }

      font-size:18px;
      color:#666;
      cursor:pointer;
    }

    .nav-btn.active{
      background:#e5e5e5;
      font-weight:700;
    }

    .content{
      display:grid;
      grid-template-columns:340px 1fr;
      gap:26px;
      padding:26px 30px 34px;
    }

      background:#f5fbff;
      border-radius:28px;
      padding:24px 20px;

    }

      text-align:center;
    }

    .left-panel p{

      font-size:18px;
      text-align:center;

    }

    }

  <script>
/* 1. ดึงวัตถุดิบ */
const selectedItems = JSON.parse(localStorage.getItem("fridgeItems")) || [];

/* 2. แสดงจำนวน */
const countEl = document.getElementById("ingredientCount");
if (countEl) {
  countEl.textContent = selectedItems.length;
}

/* 3. แสดงวัตถุดิบ */
const listEl = document.getElementById("selectedIngredients");
if (listEl) {
  listEl.innerHTML = selectedItems.map(item =>
    `<span class="chip">${item}</span>`
  ).join("");
}

/* 5. filter เมนู */
const matchedRecipes = recipes.filter(recipe =>
  recipe.ingredients.some(i => selectedItems.includes(i))
);

/* 6. แสดงผล */
const resultEl = document.getElementById("recipeList");

if (resultEl) {
  if (matchedRecipes.length === 0) {
    resultEl.innerHTML = "<p>ยังไม่มีเมนูจากวัตถุดิบนี้</p>";
  } else {
    resultEl.innerHTML = matchedRecipes.map(r => `
      <div class="card">
        <div>${r.emoji}</div>
        <h3>${r.name}</h3>
        <p>${r.detail}</p>
      </div>
    `).join("");
  }
}

/* 7. ปุ่มต้องมี function */
function goBack() {
  window.location.href = "fridge.html";
}

function goHome() {
  window.location.href = "result.html";
}
</script>

    function getFridgeItems() {
  const raw = localStorage.getItem("fridgeItems");
  return raw ? JSON.parse(raw) : [];
}

    function scoreRecipes(items) {
      return recipes.map(recipe => {
        const matched = recipe.ingredients.filter(ingredient => items.includes(ingredient));
        const missing = recipe.ingredients.filter(ingredient => !items.includes(ingredient));
        const score = recipe.ingredients.length > 0
          ? Math.round((matched.length / recipe.ingredients.length) * 100)
          : 0;

        return {
          ...recipe,
          matched,
          missing,
          score
        };
      }).sort((a, b) => b.score - a.score || a.missing.length - b.missing.length);
    }

    function renderIngredients(items) {
      document.getElementById("ingredientCount").textContent =
        "You have " + items.length + " ingredients";

      const tagBox = document.getElementById("ingredientTags");
      tagBox.innerHTML = "";

      if (items.length === 0) {
        tagBox.innerHTML = "<span class='tag'>ยังไม่ได้เลือกวัตถุดิบ</span>";
      } else {
        items.forEach(item => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = item;
          tagBox.appendChild(span);
        });
      }

      const listBox = document.getElementById("ingredientList");
      listBox.innerHTML = "";

      if (items.length === 0) {
        listBox.innerHTML = "<p style='color:#777;'>ยังไม่ได้เลือกวัตถุดิบ</p>";
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "ingredient-item";
        div.innerHTML = "<span>" + item + "</span><span>🗑️</span>";
        listBox.appendChild(div);
      });
    }

    function getBadgeClass(score) {
      if (score === 100) return "match-badge badge-good";
      if (score >= 50) return "match-badge badge-mid";
      return "match-badge badge-low";
    }

    function getBadgeText(score, missingCount) {
      if (score === 100) return "ทำได้เลย";
      if (score >= 50) return "ใกล้ครบแล้ว";
      if (missingCount === 0) return "ทำได้เลย";
      return "แนะนำเผื่อไว้";
    }

    function renderRecipes(items) {
      const scored = scoreRecipes(items);
      const recipeList = document.getElementById("recipeList");
      recipeList.innerHTML = "";

      const displayRecipes = scored.slice(0, 12);

      document.getElementById("recipeCountTitle").textContent =
        "Recommended " + displayRecipes.length + " recipes";

      displayRecipes.forEach(recipe => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        let missingText = "";
        if (recipe.missing.length === 0) {
          missingText = "คุณมีวัตถุดิบครบทั้งหมด";
        } else {
          missingText = "ยังขาด: " + recipe.missing.join(", ");
        }

        card.innerHTML = `
          <div class="recipe-img">${recipe.emoji}</div>
          <div class="recipe-info">
            <div class="${getBadgeClass(recipe.score)}">${getBadgeText(recipe.score, recipe.missing.length)}</div>
            <h4>${recipe.name}</h4>
            <p>${recipe.detail}</p>
            <p class="small-note">มีแล้ว: ${recipe.matched.length ? recipe.matched.join(", ") : "ยังไม่มีวัตถุดิบตรง"}</p>
            <p class="small-note">${missingText}</p>
          </div>
          <div class="recipe-actions">
            <div class="percent">${recipe.score}%</div>
            <div>match</div>
          </div>
        `;
        recipeList.appendChild(card);
      });
    }

    function logout() {
  const confirmLogout = confirm("ต้องการออกจากระบบหรือไม่");
  if (confirmLogout) {
    localStorage.removeItem("isLogin");
    localStorage.removeItem("loggedInEmail");
    localStorage.removeItem("loggedInName");
    window.location.href = "login.html";
  }
}

    const items = getFridgeItems();
    renderIngredients(items);
    renderRecipes(items);
