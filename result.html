    *{
      box-sizing:border-box;
      margin:0;

    }

    body{
      min-height:100vh;
      background:linear-gradient(90deg,#f06a00 0%, #d85a00 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .browser-frame{
      width:1180px;
      max-width:100%;
      background:#8f4720;
      border-radius:18px;
      padding:18px 18px 24px;
      box-shadow:0 18px 40px rgba(0,0,0,0.25);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .dots{
      display:flex;
      gap:10px;
      margin-left:6px;
    }

    .dot{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
    }

    .searchbar{
      width:520px;
      max-width:55%;
      height:54px;
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      color:#333;
      font-size:28px;
    }

    .main-card{
      background:#fff;
      border-radius:32px;
      overflow:hidden;
      min-height:700px;
      position:relative;
    }

    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 26px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      gap:12px;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      letter-spacing:1px;
      color:#8c5a46;
    }

    .nav-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-btn{
      background:#efefef;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:18px;
      color:#666;
      cursor:pointer;
    }

    .nav-btn.active{
      background:#e5e5e5;
      font-weight:700;
    }

    .content{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:28px;
      padding:28px 30px 36px;
      align-items:start;
    }

    .welcome-box{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:16px;
    }

    .avatar{
      width:100px;
      height:100px;
      border-radius:50%;
      background:#8fd0ff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:50px;
      flex-shrink:0;
    }

    .welcome-text h2{
      font-size:28px;
      color:#333;
      margin-bottom:6px;
    }

    .welcome-text p{
      font-size:20px;
      color:#666;
    }

    .recommend-tag{
      display:inline-block;
      background:#e86d6d;
      color:#fff;
      font-weight:800;
      font-size:26px;
      padding:16px 28px;
      border-radius:24px;
      margin:10px 0 8px 240px;
    }

    .dish-name-tag{
      display:inline-block;
      background:#f3e7ac;
      color:#7a6231;
      font-weight:800;
      font-size:24px;
      padding:12px 22px;
      border-radius:999px;
      margin-left:280px;
      margin-bottom:12px;
    }

    .food-image-wrap{
      display:flex;
      justify-content:flex-start;
      align-items:center;
      margin-top:-20px;
    }

    .food-circle{
      width:430px;
      height:430px;
      border-radius:50%;
      background:linear-gradient(180deg,#fffdf9,#f8f4ec);
      border:8px solid #c8d5f5;
      box-shadow:inset 0 0 0 8px #e9eefc;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:170px;
    }

    .dish-detail,
    .pref-box{
      margin-top:18px;
      background:#fff7f1;
      border:2px solid #f1d3be;
      border-radius:18px;
      padding:16px 18px;
      color:#444;
    }

    .dish-detail p,
    .pref-box p{
      font-size:18px;
      line-height:1.7;
    }

    .pref-box h3{
      font-size:20px;
      color:#555;
      margin-bottom:10px;
    }

    .question-title{
      font-size:52px;
      font-weight:900;
      color:#3f434a;
      margin-bottom:26px;
      margin-top:40px;
    }

    .action-btn{
      width:100%;
      border:none;
      border-radius:999px;
      padding:22px 24px;
      font-size:26px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      margin-bottom:18px;
    }

    .orange-btn{
      background:linear-gradient(90deg,#eca463,#d57b33);
    }

    .green-btn{
      background:linear-gradient(90deg,#9ed66c,#72be55);
    }

    .blue-btn{
      background:linear-gradient(90deg,#7ab6ff,#4c8ee8);
    }

    .sub-text{
      text-align:center;
      font-size:18px;
      color:#9a5b5b;
      margin-top:10px;
    }

    .socials{
      position:absolute;
      right:22px;
      bottom:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .social-icon{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-decoration:none;
      font-size:18px;
      font-weight:800;
    }

    .phone-btn{ background:#25d366; }
    .mail-btn{ background:#2563eb; }

    @media (max-width: 980px){
      .content{
        grid-template-columns:1fr;
      }

      .recommend-tag,
      .dish-name-tag{
        margin-left:0;
      }
.fav-btn{
  border:none;
  border-radius:999px;
  padding:12px 20px;

  font-weight:700;

}

.fav-btn:hover{
  background:#f3c5cf;

      .food-circle{

      .question-title{

    @media (max-width: 680px){
      .searchbar{

      }

        height:280px;
        font-size:100px;
      }

      .action-btn{
        font-size:22px;
        padding:18px 20px;
      }
    }

    const priceRanges = {
      "ต่ำกว่า 50 บาท": [0, 49],
      "50-100 บาท": [50, 100],
      "100-150 บาท": [100, 150],
      "150-300 บาท": [150, 300],
      "300-400 บาท": [300, 400]
    };

    let filteredMeals = [];
    let currentMeal = null;

    function getUserSelections() {
      const raw = localStorage.getItem("mealDeciderSelections");
      if (!raw) {
        return {
          favoriteFoods: [],
          avoidFoods: [],
          spicyLevel: "",
          budget: ""
        };
      }
      return JSON.parse(raw);
    }

    function filterMeals() {
  const selections = getUserSelections();

  const favoriteFoods = selections.favoriteFoods || [];
  const avoidFoods = selections.avoidFoods || [];
  const spicyLevel = selections.spicyLevel || "";
  const budget = selections.budget || "";

  function inBudget(meal) {
    if (!budget || !priceRanges[budget]) return true;
    const [min, max] = priceRanges[budget];
    return meal.price >= min && meal.price <= max;
  }

  function notAvoided(meal) {
    if (avoidFoods.length === 0) return true;
    return !avoidFoods.some(item => meal.avoidTags.includes(item));
  }

  function matchFavorite(meal) {
    if (favoriteFoods.length === 0) return true;
    return favoriteFoods.includes(meal.type);
  }

  function matchSpicy(meal) {
    if (!spicyLevel) return true;
    return meal.spicy === spicyLevel;
  }

  // ระดับที่ 1: ตรงทุกเงื่อนไข
  let result = meals.filter(meal =>
    matchFavorite(meal) &&
    notAvoided(meal) &&
    matchSpicy(meal) &&
    inBudget(meal)
  );

  // ระดับที่ 2: ถ้าไม่เจอ ผ่อน "ความเผ็ด" ออกก่อน
  if (result.length === 0) {
    result = meals.filter(meal =>
      matchFavorite(meal) &&
      notAvoided(meal) &&
      inBudget(meal)
    );
  }

  // ระดับที่ 3: ถ้าไม่เจออีก ให้เหลืออย่างน้อยประเภทอาหารที่ชอบ
  if (result.length === 0) {
    result = meals.filter(meal => matchFavorite(meal));
  }

  // ระดับที่ 4: ถ้าไม่ได้เลือกประเภทอาหารเลย ค่อยใช้ทั้งหมด
  if (result.length === 0) {
    result = meals;
  }

  filteredMeals = result;
}

    function pickRandomMeal() {
      if (filteredMeals.length === 0) return null;
      const index = Math.floor(Math.random() * filteredMeals.length);
      return filteredMeals[index];
    }
