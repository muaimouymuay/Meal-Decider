<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: orange;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      width: 700px;
      max-width: 90%;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    }
    h1 {
      color: #4f668f;
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 18px;
      margin-bottom: 16px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #f4a07b;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ลืมรหัสผ่าน</h1>
    <label for="reset-email">กรอกอีเมลของคุณ</label>
    <input id="reset-email" type="email" placeholder="example@email.com">

    <button onclick="sendReset()">ส่งลิงก์รีเซ็ต</button>
    <button onclick="window.location.href='login.html'">กลับ</button>
  </div>

  <script>
    function sendReset() {
      const email = document.getElementById("reset-email").value.trim();
      if (!email) {
        alert("กรุณากรอกอีเมล");
        return;
      }
      alert("ระบบได้ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ " + email);
    }
  </script>
</body>
</html>
