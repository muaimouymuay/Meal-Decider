<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Decider - Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(90deg, #f06a00 0%, #d85a00 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .browser-frame {
      width: 1100px;
      max-width: 100%;
      background: #9a4d24;
      border-radius: 16px;
      padding: 18px 18px 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      min-height: 30px;
    }

    .dots {
      display: flex;
      gap: 10px;
      margin-left: 6px;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.95;
    }

    .main-card {
      background: #fff;
      border-radius: 32px;
      padding: 28px 34px 30px;
      min-height: 560px;
      position: relative;
      overflow: hidden;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #8c5a46;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #efefef;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 18px;
      color: #666;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #e3e3e3;
    }

    .content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 10px 10px 0;
    }

    .left-panel {
      width: 44%;
      min-width: 340px;
    }

    .title {
      font-size: 68px;
      font-weight: 900;
      color: #4f668f;
      margin-bottom: 28px;
      line-height: 1;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 24px;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      height: 60px;
      border: 2px solid #e5e5e5;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 18px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #f28a53;
    }

    .forgot {
      display: inline-block;
      margin: 8px 0 18px;
      color: #4f668f;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 10px;
      background: #f4a07b;
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }

    .login-btn:hover {
      background: #ee8f66;
    }

    .secondary-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 10px;
      background: #efefef;
      color: #666;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .secondary-btn:hover {
      background: #e4e4e4;
    }

    .helper-text {
      margin-top: 14px;
      font-size: 16px;
      color: #888;
    }

    .right-panel {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 420px;
    }

    .illustration {
      text-align: center;
      position: relative;
    }

    .emoji-boy {
      font-size: 220px;
      line-height: 1;
    }

    .thought {
      position: absolute;
      top: 10px;
      right: -10px;
      background: #e9e9e9;
      border-radius: 40px;
      padding: 18px 24px;
      font-size: 52px;
    }

    .socials {
      position: absolute;
      right: 20px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      font-size: 20px;
    }

    .social-icon:hover {
      transform: scale(1.08);
    }

    .phone-btn {
      background: #25d366;
    }

    .mail-btn {
      background: #2563eb;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .content {
        flex-direction: column;
        align-items: stretch;
      }

      .left-panel,
      .right-panel {
        width: 100%;
        min-width: unset;
      }

      .title {
        font-size: 52px;
      }

      .right-panel {
        min-height: 260px;
      }

      .emoji-boy {
        font-size: 150px;
      }

      .thought {
        position: static;
        display: inline-block;
        margin-bottom: 16px;
        font-size: 36px;
      }
    }
    @media (max-width: 768px) {
  .content {
    flex-direction: column !important;
  }

  .left-panel,
  .right-panel,
  .left-section,
  .right-section {
    width: 100% !important;
    min-width: unset !important;
  }

  .title,
  .page-title {
    font-size: 40px !important;
    line-height: 1.2;
  }

  .logo {
    font-size: 22px !important;
  }

  .nav-actions {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .nav-btn {
    font-size: 16px !important;
    padding: 8px 14px !important;
  }

  .form-group label {
    font-size: 18px !important;
  }

  .form-group input,
  input,
  select,
  textarea {
    font-size: 16px !important;
    height: auto !important;
    padding: 12px !important;
  }

  .login-btn,
  .secondary-btn,
  button {
    width: 100% !important;
    max-width: 100% !important;
    font-size: 18px !important;
    height: auto !important;
    padding: 14px !important;
  }

  .emoji-boy {
    font-size: 120px !important;
  }

  .thought {
    font-size: 28px !important;
    position: static !important;
    display: inline-block;
    margin-bottom: 12px;
  }

  .main-card,
  .browser-frame {
    width: 100% !important;
    padding: 14px !important;
    border-radius: 20px !important;
  }
}
  </style>
</head>
<body>
  <div class="browser-frame">
    <div class="topbar">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="main-card">
      <div class="header-row">
        <div class="logo">MEAL DECIDER</div>
        <div class="nav-actions">
          <button class="nav-btn" onclick="goHistory()">ประวัติการใช้งาน</button>
          <button class="nav-btn" onclick="logout()">ออกจากระบบ</button>
        </div>
      </div>

      <div class="content">
        <div class="left-panel">
          <div class="title" id="formTitle">Login</div>

          <div class="form-group hidden" id="nameGroup">
            <label for="name">Username</label>
            <input id="name" type="text" placeholder="Enter username">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="@student.mahidol.edu or gmail.com">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password">
          </div>

          <a class="forgot" id="forgotLink" onclick="forgotPassword()">Forgot password ?</a>

          <button class="login-btn" id="mainBtn" onclick="submitForm()">เข้าสู่ระบบ</button>
          <button class="secondary-btn" id="switchBtn" onclick="toggleMode()">สมัครสมาชิก</button>

          <div class="helper-text" id="helperText">ยังไม่มีบัญชี? กดสมัครสมาชิกได้เลย</div>
        </div>

        <div class="right-panel">
          <div class="illustration">
            <div class="thought">🍢 🥤</div>
            <div class="emoji-boy">😕</div>
          </div>
        </div>
      </div>

      <div class="socials">
        <a class="social-icon phone-btn" href="tel:0929016071" title="โทรศัพท์">☎</a>
        <a class="social-icon mail-btn" href="mailto:mealdecider@example.com" title="อีเมล">✉</a>
      </div>
    </div>
  </div>

  <script>
    let isLoginMode = true;

    function toggleMode() {
      isLoginMode = !isLoginMode;

      const title = document.getElementById("formTitle");
      const nameGroup = document.getElementById("nameGroup");
      const mainBtn = document.getElementById("mainBtn");
      const switchBtn = document.getElementById("switchBtn");
      const helperText = document.getElementById("helperText");
      const forgotLink = document.getElementById("forgotLink");

      if (isLoginMode) {
        title.textContent = "เข้าสู่ระบบ";
        nameGroup.classList.add("hidden");
        mainBtn.textContent = "เข้าสู่ระบบ";
        switchBtn.textContent = "สมัครสมาชิก";
        helperText.textContent = "ยังไม่มีบัญชี? กดสมัครสมาชิกได้เลย";
        forgotLink.classList.remove("hidden");
      } else {
        title.textContent = "Apply for membership";
        nameGroup.classList.remove("hidden");
        mainBtn.textContent = "สมัครสมาชิก";
        switchBtn.textContent = "กลับไปเข้าสู่ระบบ";
        helperText.textContent = "มีบัญชีอยู่แล้ว? กดกลับไปเข้าสู่ระบบ";
        forgotLink.classList.add("hidden");
      }
    }

    function submitForm() {
      if (isLoginMode) {
        login();
      } else {
        register();
      }
    }

    function register() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
      }

      const userData = {
        name: name,
        email: email,
        password: password
      };

      localStorage.setItem("mealUser", JSON.stringify(userData));
      alert("สมัครสมาชิกสำเร็จ 🎉");
      toggleMode();

      document.getElementById("email").value = email;
      document.getElementById("password").value = "";
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("กรุณากรอกอีเมลและรหัสผ่าน");
        return;
      }

      const savedUser = JSON.parse(localStorage.getItem("mealUser"));

      if (!savedUser) {
        alert("ยังไม่มีบัญชีผู้ใช้ กรุณาสมัครสมาชิกก่อน");
        return;
      }

      if (email === savedUser.email && password === savedUser.password) {
 localStorage.setItem("isLogin", "true");
        localStorage.setItem("loggedInEmail", savedUser.email);
        localStorage.setItem("loggedInName", savedUser.name);
        window.location.href = "home.html";
      } else {
        alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
      }
    }

    function forgotPassword() {
      const email = document.getElementById("email").value.trim();
      const savedUser = JSON.parse(localStorage.getItem("mealUser"));

      if (!savedUser) {
        alert("ยังไม่มีบัญชีในระบบ");
        return;
      }

      if (!email) {
        alert("กรุณากรอกอีเมลก่อนกดลืมรหัสผ่าน");
        return;
      }

      if (email !== savedUser.email) {
        alert("ไม่พบอีเมลนี้ในระบบ");
        return;
      }

      alert("รหัสผ่านของคุณคือ: " + savedUser.password);
    }

    function goHistory() {
      window.location.href = "history.html";
    }

    function logout() {
      const confirmLogout = confirm("ต้องการออกจากระบบหรือไม่");
      if (confirmLogout) {
        localStorage.removeItem("isLogin");
        localStorage.removeItem("loggedInEmail");
        localStorage.removeItem("loggedInName");
        window.location.href = "login.html";
      }
    }
  </script>
</body>
</html>
